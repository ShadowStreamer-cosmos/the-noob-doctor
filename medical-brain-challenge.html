<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Noob Doctor — Quiz for MBBS & NEET PG</title>
    <meta name="description"
        content="Test your medical knowledge with The Noob Doctor. 80+ MCQs across 8 specialties for MBBS students and NEET PG aspirants.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0e1a;
            --card: #131832;
            --card2: #1a2040;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --green: #00b894;
            --red: #e17055;
            --orange: #fdcb6e;
            --text: #e8e8f0;
            --text2: #8b8db0;
            --radius: 16px;
            --glow: 0 0 30px rgba(108, 92, 231, 0.3)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.05)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-8px)
            }

            40%,
            80% {
                transform: translateX(8px)
            }
        }

        @keyframes progressFill {
            from {
                width: 0
            }

            to {
                width: var(--fill)
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(108, 92, 231, 0.4)
            }

            50% {
                box-shadow: 0 0 40px rgba(108, 92, 231, 0.8)
            }
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1
            }

            100% {
                transform: translateY(600px) rotate(720deg);
                opacity: 0
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.5)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes barGrow {
            from {
                width: 0%
            }

            to {
                width: var(--target-width)
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0
            }

            50% {
                transform: scale(1.15)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease
        }

        .screen.active {
            display: flex
        }

        /* Home Screen */
        .hero {
            text-align: center;
            padding: 40px 0 30px
        }

        .hero-icon {
            font-size: 72px;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 16px
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px
        }

        .hero p {
            color: var(--text2);
            font-size: 14px;
            line-height: 1.5
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            justify-content: center
        }

        .stat {
            background: var(--card);
            border-radius: 12px;
            padding: 12px 18px;
            text-align: center;
            flex: 1
        }

        .stat .val {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent2)
        }

        .stat .lbl {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px
        }

        /* Category Grid */
        .cat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0
        }

        .cat-card {
            background: var(--card);
            border: 1px solid rgba(108, 92, 231, 0.15);
            border-radius: var(--radius);
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity 0.3s
        }

        .cat-card:hover,
        .cat-card:active {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--glow)
        }

        .cat-card:hover::before,
        .cat-card:active::before {
            opacity: 1
        }

        .cat-card .emoji {
            font-size: 36px;
            margin-bottom: 8px;
            display: block
        }

        .cat-card .name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px
        }

        .cat-card .count {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px
        }

        /* Quiz Screen */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 16px
        }

        .quiz-cat {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent2)
        }

        .quiz-progress {
            font-size: 13px;
            color: var(--text2)
        }

        .timer-bar {
            height: 6px;
            background: var(--card2);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden
        }

        .timer-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s linear, background 0.5s;
            background: var(--green)
        }

        .timer-fill.warning {
            background: var(--orange)
        }

        .timer-fill.danger {
            background: var(--red)
        }

        .timer-text {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px
        }

        .timer-text.warning {
            color: var(--orange)
        }

        .timer-text.danger {
            color: var(--red);
            animation: pulse 0.5s infinite
        }

        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            animation: slideUp 0.4s ease
        }

        .q-number {
            font-size: 11px;
            color: var(--accent2);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px
        }

        .q-text {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px
        }

        .option {
            background: var(--card);
            border: 2px solid rgba(108, 92, 231, 0.15);
            border-radius: 14px;
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            animation: slideUp 0.4s ease;
            animation-fill-mode: both
        }

        .option:nth-child(1) {
            animation-delay: 0.05s
        }

        .option:nth-child(2) {
            animation-delay: 0.1s
        }

        .option:nth-child(3) {
            animation-delay: 0.15s
        }

        .option:nth-child(4) {
            animation-delay: 0.2s
        }

        .option:hover {
            border-color: var(--accent);
            background: var(--card2)
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.15)
        }

        .option.correct {
            border-color: var(--green);
            background: rgba(0, 184, 148, 0.15);
            animation: pulse 0.4s
        }

        .option.wrong {
            border-color: var(--red);
            background: rgba(225, 112, 85, 0.15);
            animation: shake 0.4s
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.6
        }

        .option.correct.disabled,
        .option.wrong.disabled {
            opacity: 1
        }

        .opt-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--card2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0
        }

        .option.correct .opt-letter {
            background: var(--green);
            color: #fff
        }

        .option.wrong .opt-letter {
            background: var(--red);
            color: #fff
        }

        .opt-text {
            font-size: 14px;
            line-height: 1.5
        }

        .explanation-card {
            background: linear-gradient(135deg, #1a2040, #1e2550);
            border: 1px solid rgba(108,92,231,0.25);
            border-left: 4px solid var(--green);
            border-radius: 14px;
            padding: 18px 16px;
            margin: 12px 0;
            animation: slideUp 0.4s ease;
            display: none;
        }
        .explanation-card.visible { display: block }
        .explanation-card .exp-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--green);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .explanation-card .exp-text {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
        }
        .explanation-card .exp-revise {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(108,92,231,0.12);
            border-radius: 8px;
            font-size: 12px;
            color: var(--accent2);
            font-weight: 600;
        }

        /* Inline Quiz Nav Arrows */
        .quiz-nav-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .quiz-nav-row .timer-bar-wrap { flex: 1 }
        .q-arrow {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--card2);
            color: var(--accent2);
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            padding: 0;
            line-height: 1;
        }
        .q-arrow:hover { background: var(--accent); color: #fff }
        .q-arrow:disabled { opacity: 0.2; cursor: default; background: var(--card2); color: var(--accent2) }
        .q-arrow.visible { display: flex }

        .next-btn,
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter';
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            color: #fff;
            margin-top: 8px
        }

        .next-btn:hover,
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow)
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent2)
        }

        .btn-outline:hover {
            background: rgba(108, 92, 231, 0.1)
        }

        .btn-share {
            background: linear-gradient(135deg, #00b894, #00cec9)
        }

        .btn-danger {
            background: linear-gradient(135deg, #e17055, #d63031)
        }

        /* Result Screen */
        .result-container {
            text-align: center;
            padding: 20px 0
        }

        .result-emoji {
            font-size: 80px;
            animation: bounceIn 0.6s ease;
            margin-bottom: 16px
        }

        .result-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px
        }

        .result-score {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .result-subtitle {
            color: var(--text2);
            font-size: 14px;
            margin: 8px 0 24px
        }

        .progress-container {
            margin: 24px 0;
            padding: 0 8px
        }

        .progress-label {
            text-align: left;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 8px;
            font-weight: 600
        }

        .progress-bar-outer {
            height: 28px;
            background: var(--card2);
            border-radius: 14px;
            overflow: hidden;
            position: relative
        }

        .progress-bar-inner {
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            transition: width 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 0
        }

        .progress-bar-inner.animate {
            width: var(--target-width)
        }

        .personality-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin: 20px 0;
            border: 1px solid rgba(108, 92, 231, 0.2);
            animation: slideUp 0.6s ease 0.5s both
        }

        .personality-emoji {
            font-size: 52px;
            margin-bottom: 12px
        }

        .personality-level {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent2);
            margin-bottom: 8px
        }

        .personality-roast {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.6;
            font-style: italic
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 20px 0
        }

        .score-item {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            text-align: center
        }

        .score-item .val {
            font-size: 22px;
            font-weight: 800
        }

        .score-item .lbl {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px
        }

        .score-item.green .val {
            color: var(--green)
        }

        .score-item.red .val {
            color: var(--red)
        }

        .score-item.orange .val {
            color: var(--orange)
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px
        }

        /* Leaderboard */
        .lb-list {
            margin: 16px 0
        }

        .lb-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            animation: slideUp 0.3s ease;
            animation-fill-mode: both
        }

        .lb-rank {
            font-size: 20px;
            font-weight: 900;
            width: 36px;
            text-align: center
        }

        .lb-rank.gold {
            color: #fdcb6e
        }

        .lb-rank.silver {
            color: #b2bec3
        }

        .lb-rank.bronze {
            color: #e17055
        }

        .lb-info {
            flex: 1
        }

        .lb-name {
            font-size: 14px;
            font-weight: 700
        }

        .lb-detail {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px
        }

        .lb-score {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent2)
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent2);
            font-family: 'Inter';
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin: 16px 0 8px
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti 3s ease-in forwards;
            z-index: 1000;
            border-radius: 2px
        }

        /* Responsive */
        @media(max-width:380px) {
            .hero h1 {
                font-size: 24px
            }

            .cat-grid {
                gap: 8px
            }

            .cat-card {
                padding: 16px 10px
            }
        }

        /* Profile Screen */
        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent2);
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-group label span { color: var(--red); }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--card);
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter';
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: var(--accent) }
        .form-group input::placeholder { color: var(--text2) }
        .form-error { color: var(--red); font-size: 12px; margin-top: 4px; display: none }
        .greeting {
            font-size: 13px;
            color: var(--text2);
            text-align: center;
            margin-top: -8px;
            margin-bottom: 4px;
        }
        .greeting strong { color: var(--accent2) }
        .edit-profile-btn {
            background: none; border: none; color: var(--accent2); font-size: 12px;
            font-family: 'Inter'; cursor: pointer; text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container" id="app">

        <!-- PROFILE SCREEN -->
        <div class="screen" id="profileScreen">
            <div class="hero">
                <div class="hero-icon">👨‍⚕️</div>
                <h1>Welcome, Doctor!</h1>
                <p>Tell us a bit about yourself</p>
            </div>
            <div class="profile-form">
                <div class="form-group">
                    <label>YOUR NAME <span>*</span></label>
                    <input type="text" id="profileName" placeholder="e.g. Dr. Shadow" maxlength="30">
                    <div class="form-error" id="nameError">Please enter your name</div>
                </div>
                <div class="form-group">
                    <label>EMAIL ADDRESS <span style="color:var(--text2)">(optional)</span></label>
                    <input type="email" id="profileEmail" placeholder="shadow@hospital.com">
                </div>
                <button class="btn" onclick="saveProfile()" style="margin-top:8px">🚀 Let's Go!</button>
            </div>
        </div>

        <!-- HOME SCREEN -->
        <div class="screen" id="homeScreen">
            <div class="hero">
                <div class="hero-icon">🧠</div>
                <h1>The Noob Doctor</h1>
                <p>Test your clinical knowledge. Compete. Conquer.</p>
            </div>
            <div class="greeting" id="greetingBar"></div>
            <div class="stats-bar">
                <div class="stat">
                    <div class="val" id="totalPlayed">0</div>
                    <div class="lbl">Played</div>
                </div>
                <div class="stat">
                    <div class="val" id="bestScore">-</div>
                    <div class="lbl">Best</div>
                </div>
                <div class="stat">
                    <div class="val" id="avgScore">-</div>
                    <div class="lbl">Avg %</div>
                </div>
            </div>
            <div class="section-title">Choose Specialty</div>
            <div class="cat-grid" id="catGrid"></div>
            <button class="btn btn-outline" style="margin-top:12px"
                onclick="showScreen('lbScreen');renderLeaderboard()">🏆 Leaderboard</button>
        </div>

        <!-- SUBCATEGORY SCREEN (generic) -->
        <div class="screen" id="subCatScreen">
            <button class="back-btn" onclick="showScreen('homeScreen');updateHomeStats()">← Back to Specialties</button>
            <div class="hero" style="padding:24px 0 16px">
                <div class="hero-icon" style="font-size:52px" id="subCatEmoji"></div>
                <h1 style="font-size:22px" id="subCatTitle"></h1>
                <p>Choose a subspecialty</p>
            </div>
            <div class="cat-grid" id="subCatGrid"></div>
        </div>

        <!-- QUIZ SCREEN -->
        <div class="screen" id="quizScreen">
            <div class="quiz-header">
                <button class="back-btn" onclick="confirmQuit()">← Quit</button>
                <div class="quiz-cat" id="quizCat"></div>
                <div class="quiz-progress" id="quizProg"></div>
            </div>
            <div class="quiz-nav-row">
                <button class="q-arrow" id="prevBtn" onclick="prevQuestion()">←</button>
                <div class="timer-bar-wrap">
                    <div class="timer-bar">
                        <div class="timer-fill" id="timerFill"></div>
                    </div>
                </div>
                <button class="q-arrow" id="nextBtn" onclick="nextQuestion()">→</button>
            </div>
            <div class="timer-text" id="timerText">45</div>
            <div class="question-card">
                <div class="q-number" id="qNum"></div>
                <div class="q-text" id="qText"></div>
            </div>
            <div class="options" id="optionsDiv"></div>
            <div class="explanation-card" id="expCard">
                <div class="exp-title">💡 EXPLANATION</div>
                <div class="exp-text" id="expText"></div>
                <div class="exp-revise" id="expRevise"></div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div class="screen" id="resultScreen">
            <div class="result-container" id="resultContainer"></div>
        </div>

        <!-- LEADERBOARD SCREEN -->
        <div class="screen" id="lbScreen">

            ],

                { q: "Most common carpal bone fracture?", o: ["Lunate", "Scaphoid", "Triquetrum", "Capitate"], a: 1 },
                { q: "Colles' fracture has?", o: ["Volar displacement", "Dorsal displacement", "Lateral displacement", "No displacement"], a: 1 },
                { q: "Pott's fracture involves?", o: ["Femur", "Tibia", "Ankle", "Wrist"], a: 2 },
                { q: "Most common bone tumor?", o: ["Osteosarcoma", "Metastasis", "Ewing's sarcoma", "Chondrosarcoma"], a: 1 },
                { q: "Garden classification is for fractures of?", o: ["Femoral neck", "Tibial plateau", "Colles", "Scaphoid"], a: 0 },
                { q: "Erb's palsy involves nerve roots?", o: ["C5-C6", "C7-C8", "C8-T1", "C4-C5"], a: 0 },
                { q: "Trendelenburg test is positive when which muscle is weak?", o: ["Quadriceps", "Gluteus medius", "Hamstrings", "Iliopsoas"], a: 1 },
                { q: "Boutonniere deformity is?", o: ["PIP flexion + DIP hyperextension", "PIP hyperextension + DIP flexion", "MCP hyperextension", "All flexion"], a: 0 },
                { q: "Most common site of osteosarcoma?", o: ["Lower end of femur", "Upper end of tibia", "Upper end of humerus", "Pelvis"], a: 0 },
                { q: "Thomas test detects?", o: ["Knee flexion deformity", "Hip flexion deformity", "Ankle deformity", "Shoulder deformity"], a: 1 },
                { q: "Bankart lesion is seen in?", o: ["Knee dislocation", "Shoulder dislocation", "Hip dislocation", "Elbow dislocation"], a: 1 },
                { q: "Dinner fork deformity is seen in?", o: ["Smith's fracture", "Colles' fracture", "Monteggia", "Galeazzi"], a: 1 }
            ]
        };

        const CAT_META = {
            Medicine: { emoji: "💊", color: "#6c5ce7", hasSubcategories: true }, Surgery: { emoji: "🔪", color: "#e17055" },
            OBG: { emoji: "🤰", color: "#fd79a8", hasSubcategories: true }, Paeds: { emoji: "👶", color: "#00cec9" },
            ENT: { emoji: "👂", color: "#fdcb6e" }, Ophthalmology: { emoji: "👁️", color: "#00b894" },
            Dermatology: { emoji: "🧴", color: "#e84393" }, Ortho: { emoji: "🦴", color: "#0984e3" }
        };

        const LEVELS = [
            { max: 10, emoji: "🦧", title: "Tarzan Mode", roast: "You learned medicine from jungle animals. Tarzan knows more anatomy than you." },
            { max: 25, emoji: "🧒", title: "School Kid", roast: "You know basic biology. Gold star for effort. Maybe stick to Band-Aids." },
            { max: 40, emoji: "📚", title: "High Schooler", roast: "NEET UG is calling. Maybe answer it. Your textbooks are crying in the corner." },
            { max: 55, emoji: "🩺", title: "Intern Vibes", roast: "You've opened a textbook at least once. Your seniors are watching... nervously." },
            { max: 70, emoji: "💊", title: "MBBS Student", roast: "Respectable. Your patients might survive. Emphasis on 'might'." },
            { max: 82, emoji: "🔬", title: "PG Territory", roast: "MD material. Keep grinding. The coffee machine knows your face by now." },
            { max: 92, emoji: "👨‍⚕️", title: "Senior Resident", roast: "Grey's Anatomy would cast you. McDreamy who? You're McBrainy." },
            { max: 99, emoji: "🧠", title: "Consultant Level", roast: "Professors fear you in viva. You make examiners Google answers." },
            { max: 100, emoji: "🌟", title: "Medical Genius", roast: "Are you even human? Respect. Harrison's was written about you." }
        ];

        // ========== STATE ==========
        let currentCat = "", currentQs = [], currentIdx = 0, score = 0, timer = null, timeLeft = 45, answered = false;
        let userAnswers = []; // tracks what user picked: -1=unanswered, -2=timed out, 0-3=option idx

        // ========== INIT ==========
        function init() {
            const grid = document.getElementById('catGrid');
            grid.innerHTML = '';
            Object.keys(CAT_META).forEach(cat => {
                const m = CAT_META[cat];
                const totalQs = m.hasSubcategories
                    ? Object.values(SUBCATEGORIES[cat]).reduce((s, sc) => s + sc.questions.length, 0)
                    : QUESTIONS[cat].length;
                const d = document.createElement('div');
                d.className = 'cat-card';
                d.onclick = () => {
                    if (m.hasSubcategories) {
                        showSubcategories(cat);
                    } else {
                        startQuiz(cat);
                    }
                };
                d.innerHTML = `<span class="emoji">${m.emoji}</span><div class="name">${cat}</div><div class="count">${totalQs} Qs</div>`;
                grid.appendChild(d);
            });
            updateHomeStats();
        }

        let currentParentCat = '';

        function showSubcategories(parentCat) {
            currentParentCat = parentCat;
            const subData = SUBCATEGORIES[parentCat];
            const meta = CAT_META[parentCat];
            document.getElementById('subCatEmoji').textContent = meta.emoji;
            document.getElementById('subCatTitle').textContent = parentCat;
            const grid = document.getElementById('subCatGrid');
            grid.innerHTML = '';
            Object.keys(subData).forEach(sub => {
                const sc = subData[sub];
                const d = document.createElement('div');
                d.className = 'cat-card';
                d.onclick = () => startSubQuiz(parentCat, sub);
                d.innerHTML = `<span class="emoji">${sc.emoji}</span><div class="name">${sub}</div><div class="count">${sc.questions.length} Qs</div>`;
                grid.appendChild(d);
            });
            showScreen('subCatScreen');
        }

        function startSubQuiz(parentCat, subName) {
            const sc = SUBCATEGORIES[parentCat][subName];
            currentCat = subName;
            currentIdx = 0; answered = false;
            userAnswers = new Array(10).fill(-1);
            currentQs = shuffle([...sc.questions]).slice(0, 10);
            showScreen('quizScreen');
            document.getElementById('quizCat').textContent = sc.emoji + ' ' + subName;
            renderQuestion();
        }

        function updateHomeStats() {
            const lb = JSON.parse(localStorage.getItem('mbc_leaderboard') || '[]');
            document.getElementById('totalPlayed').textContent = lb.length;
            if (lb.length > 0) {
                const best = Math.max(...lb.map(e => e.pct));
                const avg = Math.round(lb.reduce((s, e) => s + e.pct, 0) / lb.length);
                document.getElementById('bestScore').textContent = best + '%';
                document.getElementById('avgScore').textContent = avg + '%';
            } else {
                document.getElementById('bestScore').textContent = '-';
                document.getElementById('avgScore').textContent = '-';
            }
        }

        // ========== SCREENS ==========
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ========== QUIZ ==========
        function startQuiz(cat) {
            currentCat = cat; currentIdx = 0; answered = false;
            userAnswers = new Array(10).fill(-1);
            currentQs = shuffle([...QUESTIONS[cat]]).slice(0, 10);
            showScreen('quizScreen');
            document.getElementById('quizCat').textContent = CAT_META[cat].emoji + ' ' + cat;
            renderQuestion();
        }

        // Renders the current question — either fresh (with timer) or review (already answered)
        function renderQuestion() {
            clearInterval(timer);
            const q = currentQs[currentIdx];
            const prevAnswer = userAnswers[currentIdx]; // -1 = not yet answered
            const alreadyDone = prevAnswer !== -1;

            answered = alreadyDone;

            document.getElementById('quizProg').textContent = `${currentIdx + 1}/10`;
            document.getElementById('qNum').textContent = `QUESTION ${currentIdx + 1} OF 10`;
            document.getElementById('qText').textContent = q.q;

            const od = document.getElementById('optionsDiv');
            od.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];

            q.o.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = 'option';
                if (alreadyDone) {
                    d.classList.add('disabled');
                    if (i === q.a) d.classList.add('correct');
                    if (prevAnswer >= 0 && i === prevAnswer && prevAnswer !== q.a) d.classList.add('wrong');
                }
                d.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt}</div>`;
                if (!alreadyDone) d.onclick = () => selectOption(i);
                od.appendChild(d);
            });

            if (alreadyDone) {
                // Review mode — no timer, show explanation + arrows
                document.getElementById('timerText').textContent = '--';
                document.getElementById('timerFill').style.width = '0%';
                document.getElementById('timerFill').className = 'timer-fill';
                document.getElementById('timerText').className = 'timer-text';
                showExplanation(q);
                showQuizNav();
            } else {
                // Fresh question — start timer, hide arrows + explanation
                hideQuizArrows();
                document.getElementById('expCard').classList.remove('visible');
                startTimer();
            }
        }

        // Legacy alias
        function loadQuestion() { renderQuestion(); }

        function selectOption(idx) {
            if (answered) return;
            answered = true; clearInterval(timer);
            userAnswers[currentIdx] = idx; // store user's pick
            const q = currentQs[currentIdx];
            const opts = document.querySelectorAll('.option');
            opts.forEach((o, i) => {
                o.classList.add('disabled');
                if (i === q.a) o.classList.add('correct');
                if (i === idx && idx !== q.a) o.classList.add('wrong');
            });
            showExplanation(q);
            showQuizNav();
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= 10) { hideQuizArrows(); computeScore(); showResults(); return }
            renderQuestion();
        }

        function prevQuestion() {
            if (currentIdx <= 0) return;
            currentIdx--;
            renderQuestion();
        }

        function computeScore() {
            score = 0;
            for (let i = 0; i < 10; i++) {
                if (userAnswers[i] === currentQs[i].a) score++;
            }
        }

        function showQuizNav() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            prevBtn.disabled = currentIdx <= 0;
            prevBtn.classList.add('visible');
            nextBtn.textContent = currentIdx === 9 ? '✓' : '→';
            nextBtn.classList.add('visible');
        }

        function hideQuizArrows() {
            document.getElementById('prevBtn').classList.remove('visible');
            document.getElementById('nextBtn').classList.remove('visible');
        }

        function startTimer() {
            timeLeft = 45;
            const fill = document.getElementById('timerFill');
            const txt = document.getElementById('timerText');
            fill.style.width = '100%'; fill.className = 'timer-fill';
            txt.className = 'timer-text'; txt.textContent = '45';
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                const pct = (timeLeft / 45) * 100;
                fill.style.width = pct + '%';
                txt.textContent = timeLeft;
                if (timeLeft <= 10) { fill.className = 'timer-fill danger'; txt.className = 'timer-text danger' }
                else if (timeLeft <= 20) { fill.className = 'timer-fill warning'; txt.className = 'timer-text warning' }
                if (timeLeft <= 0) { clearInterval(timer); timeUp() }
            }, 1000);
        }

        function timeUp() {
            if (answered) return;
            answered = true;
            userAnswers[currentIdx] = -2; // timed out
            const q = currentQs[currentIdx];
            const opts = document.querySelectorAll('.option');
            opts.forEach((o, i) => { o.classList.add('disabled'); if (i === q.a) o.classList.add('correct'); });
            showExplanation(q);
            showQuizNav();
        }

        function confirmQuit() {
            if (confirm('Quit quiz? Progress will be lost.')) { clearInterval(timer); hideQuizArrows(); showScreen('homeScreen'); updateHomeStats() }
        }

        // ========== RESULTS ==========
        function showResults() {
            clearInterval(timer);
            const pct = Math.round((score / 10) * 100);
            const level = LEVELS.find(l => pct <= l.max) || LEVELS[LEVELS.length - 1];

            // Save to leaderboard
            const lb = JSON.parse(localStorage.getItem('mbc_leaderboard') || '[]');
            lb.push({ cat: currentCat, score, pct, level: level.title, date: new Date().toLocaleDateString(), time: Date.now(), name: getProfileName() });
            lb.sort((a, b) => b.pct - a.pct || b.time - a.time);
            if (lb.length > 50) lb.length = 50;
            localStorage.setItem('mbc_leaderboard', JSON.stringify(lb));

            // Track quiz completion
            trackEvent('quiz_complete', { category: currentCat, score, pct, level: level.title });

            // Colors for progress bar
            const barColors = ['#e17055', '#e17055', '#fdcb6e', '#fdcb6e', '#00b894', '#00b894', '#6c5ce7', '#6c5ce7', '#fd79a8'];
            const levelIdx = LEVELS.indexOf(level);
            const barColor = barColors[levelIdx] || '#6c5ce7';

            const rc = document.getElementById('resultContainer');
            rc.innerHTML = `
<div class="result-emoji">${pct >= 70 ? '🎉' : '🏥'}</div>
<div class="result-title">Quiz Complete!</div>
<div class="result-score">${score}/10</div>
<div class="result-subtitle">${currentCat} • ${pct}% Accuracy</div>
<div class="score-breakdown">
<div class="score-item green"><div class="val">${score}</div><div class="lbl">Correct</div></div>
<div class="score-item red"><div class="val">${10 - score}</div><div class="lbl">Wrong</div></div>
<div class="score-item orange"><div class="val">${pct}%</div><div class="lbl">Score</div></div>
</div>
<div class="progress-container">
<div class="progress-label">YOUR LEVEL</div>
<div class="progress-bar-outer">
<div class="progress-bar-inner" id="resultBar" style="--target-width:${pct}%;background:linear-gradient(90deg,${barColor},${barColor}dd)">${pct}%</div>
</div>
</div>
<div class="personality-card" id="personalityCard">
<div class="personality-emoji">${level.emoji}</div>
<div class="personality-level">${level.title}</div>
<div class="personality-roast">"${level.roast}"</div>
</div>
<div class="btn-group">
<button class="btn btn-share" onclick="shareScore()">📤 Share Score</button>
<button class="btn" onclick="startQuiz(currentCat)">🔄 Retry ${currentCat}</button>
<button class="btn btn-outline" onclick="showScreen('homeScreen');updateHomeStats()">🏠 Home</button>
<button class="btn btn-outline" onclick="showScreen('lbScreen');renderLeaderboard()">🏆 Leaderboard</button>
</div>`;

            showScreen('resultScreen');

            // Animate progress bar
            setTimeout(() => { document.getElementById('resultBar').classList.add('animate') }, 300);

            // Confetti for high scores
            if (pct >= 70) launchConfetti();
        }

        function shareScore() {
            const pct = Math.round((score / 10) * 100);
            const level = LEVELS.find(l => pct <= l.max) || LEVELS[LEVELS.length - 1];
            const catMeta = CAT_META[currentCat] || MED_SUBCATEGORIES[currentCat] || {emoji:'💊'};
            const text = `🧠 The Noob Doctor\n${catMeta.emoji} ${currentCat}\n\n📊 Score: ${score}/10 (${pct}%)\n${level.emoji} Level: ${level.title}\n"${level.roast}"\n\n🔥 Can you beat me? Try now!`;
            if (navigator.share) {
                navigator.share({ title: 'The Noob Doctor', text }).catch(() => { });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('Score copied to clipboard! 📋')).catch(() => { });
            }
        }

        // ========== LEADERBOARD ==========
        function renderLeaderboard() {
            const lb = JSON.parse(localStorage.getItem('mbc_leaderboard') || '[]');
            const list = document.getElementById('lbList');
            if (lb.length === 0) { list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px 0">No scores yet. Play a quiz!</p>'; return }
            list.innerHTML = lb.slice(0, 20).map((e, i) => {
                const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                return `<div class="lb-item" style="animation-delay:${i * 0.05}s">
<div class="lb-rank ${rankClass}">${i < 3 ? ['🥇', '🥈', '🥉'][i] : (i + 1)}</div>
<div class="lb-info"><div class="lb-name">${e.name || 'Player'} • ${CAT_META[e.cat]?.emoji || ''} ${e.cat}</div><div class="lb-detail">${e.level} • ${e.date}</div></div>
<div class="lb-score">${e.pct}%</div>
</div>`;
            }).join('');
        }

        // ========== HELPERS ==========
        function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]] } return arr }

        function launchConfetti() {
            const colors = ['#6c5ce7', '#a29bfe', '#fd79a8', '#00b894', '#fdcb6e', '#e17055', '#00cec9'];
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDelay = Math.random() * 2 + 's';
                el.style.animationDuration = (2 + Math.random() * 2) + 's';
                el.style.width = (6 + Math.random() * 8) + 'px';
                el.style.height = (6 + Math.random() * 8) + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
        }

        function showExplanation(q) {
            const card = document.getElementById('expCard');
            const textEl = document.getElementById('expText');
            const reviseEl = document.getElementById('expRevise');
            if (q.e) {
                textEl.innerHTML = q.e;
                reviseEl.style.display = q.r ? 'block' : 'none';
                if (q.r) reviseEl.innerHTML = '📚 Revise: ' + q.r;
                card.classList.add('visible');
            } else {
                textEl.innerHTML = '✅ Correct answer: <strong>' + q.o[q.a] + '</strong>';
                reviseEl.style.display = 'none';
                card.classList.add('visible');
            }
        }
