"Barrett's esophagus increases risk of?":["Intestinal metaplasia (squamous → columnar) from chronic GERD → increased risk of esophageal adenocarcinoma, NOT squamous cell CA.","GERD & Barrett's"],
"Celiac disease is associated with which HLA?":["HLA-DQ2 (95%) and DQ8 (5%). Anti-tTG IgA is the screening test. Gold standard = duodenal biopsy showing villous atrophy.","Celiac Disease"],
"Crohn's disease most commonly affects?":["Terminal ileum is the most common site. Skip lesions, transmural inflammation, non-caseating granulomas. UC = continuous, mucosal, starts at rectum.","IBD — Crohn's vs UC"],
"Hepatorenal syndrome is characterized by?":["Functional renal failure in advanced liver disease with NO intrinsic kidney damage. Kidneys are structurally normal. Poor prognosis without liver transplant.","Hepatorenal Syndrome"],
"Anti-mitochondrial antibodies are seen in?":["AMA is highly specific (>95%) for primary biliary cholangitis (PBC). PSC = p-ANCA. Autoimmune hepatitis = ANA/anti-SMA. Wilson's = low ceruloplasmin.","Autoimmune Liver Diseases"],
// Pulmonology
"Most common type of lung cancer?":["Adenocarcinoma is now the most common (especially in non-smokers & women). Squamous cell was previously #1. Small cell is most aggressive.","Lung Cancer Classification"],
"Most common cause of community-acquired pneumonia?":["Streptococcus pneumoniae is the #1 CAP pathogen worldwide. Klebsiella = alcoholics (currant jelly sputum). Staph = post-influenza.","Community-Acquired Pneumonia"],
"Pancoast tumor involves?":["Superior sulcus/apex tumor causing Horner syndrome (miosis, ptosis, anhidrosis) + C8-T1 nerve root involvement. Usually squamous cell type.","Pancoast Tumor"],
"Honeycomb lung is seen in?":["End-stage IPF (idiopathic pulmonary fibrosis). Shows UIP pattern on HRCT. Restrictive PFTs. Treatment: pirfenidone/nintedanib. Lung transplant for severe cases.","Interstitial Lung Disease"],
"Most common cause of exudative pleural effusion?":["TB is the most common cause of exudative effusion in India. Worldwide, parapneumonic/pneumonia. Heart failure = most common transudative cause (Light's criteria).","Pleural Effusion"],
"Hamman's sign is associated with?":["Crunching sound synchronous with heartbeat in pneumomediastinum (mediastinal emphysema). NOT pneumothorax. Boerhaave syndrome is a common cause.","Pneumomediastinum"],
"PFT in obstructive disease shows?":["FEV1/FVC ratio is DECREASED (<0.7). FEV1 falls more than FVC. In restrictive disease, FEV1/FVC is normal or increased (both reduced proportionally).","Pulmonary Function Tests"],
"Ghon focus in tuberculosis is located in?":["Primary complex = Ghon focus (subpleural mid/lower zone) + hilar lymphadenopathy. Reactivation TB = apex/upper lobes. Classic exam trap with location!","Primary vs Reactivation TB"],
"Type 2 respiratory failure is defined by?":["PaO2 <60 + PaCO2 >50 mmHg (hypoxic + hypercapnic). Type 1 = hypoxia only (normal/low CO2). COPD & hypoventilation cause Type 2.","Respiratory Failure Types"],
"Curschmann spirals are seen in?":["Spiral-shaped mucus casts of small airways in bronchial asthma. Charcot-Leyden crystals = eosinophil breakdown products, also seen in asthma.","Bronchial Asthma Pathology"],
// Endocrinology
"Most common cause of Cushing's syndrome?":["Iatrogenic (exogenous steroids) is the most common overall. Most common endogenous cause = pituitary adenoma (Cushing's DISEASE). Classic trap!","Cushing's Syndrome vs Disease"],
"HbA1c reflects blood glucose control over?":["HbA1c reflects average glucose over 2-3 months (RBC lifespan = 120 days). Fructosamine = 2-3 weeks. SMBG = real-time.","Diabetes Monitoring"],
"Most common cause of hyperthyroidism?":["Graves' disease (diffuse toxic goiter) — TSI antibodies stimulate TSH receptor. Toxic adenoma = single hot nodule. Thyroiditis = transient.","Hyperthyroidism"],
"Chvostek's sign is seen in?":["Tapping facial nerve causes facial muscle twitch in hypocalcemia. Trousseau's = carpal spasm with BP cuff. Both indicate neuromuscular irritability.","Calcium Disorders"],
"Conn's syndrome is caused by?":["Aldosterone-producing adenoma → primary hyperaldosteronism → hypertension + hypokalemia + metabolic alkalosis. Pheochromocytoma produces catecholamines.","Adrenal Tumors"],
"Most common cause of Addison's disease?":["Autoimmune adrenalitis is #1 in developed countries. TB is #1 worldwide/India. Presents with hyperpigmentation, hypotension, hyperkalemia.","Adrenal Insufficiency"],
"MEN 1 syndrome includes all EXCEPT?":["MEN 1 = 3 Ps: Pituitary + Parathyroid + Pancreatic tumors. Medullary thyroid CA is part of MEN 2A/2B, NOT MEN 1.","MEN Syndromes"],
"Dawn phenomenon is caused by?":["Early morning GH & cortisol surge → hyperglycemia at dawn (4-8 AM). Somogyi effect = rebound hyperglycemia after nocturnal hypoglycemia. Different treatment!","Dawn vs Somogyi Effect"],
"DKA is characterized by all EXCEPT?":["DKA = hyperglycemia + ketoacidosis + ketonuria. It's caused by insulin DEFICIENCY, not excess. More common in Type 1 DM. HHS is more common in Type 2.","Diabetic Emergencies"],
"Thyroid storm is treated with all EXCEPT?":["Propranolol (symptomatic relief) + PTU (blocks synthesis & conversion) + Lugol's iodine (blocks release). Levothyroxine would WORSEN the storm!","Thyroid Storm Management"],
// Rheumatology
"Rheumatoid factor is an antibody against?":["RF is an IgM antibody against the Fc portion of IgG. Present in 70-80% of RA but not specific — also seen in SLE, Sjögren's, infections.","Rheumatoid Arthritis"],
"Heberden's nodes are seen at?":["Heberden's = DIP joints (osteoarthritis). Bouchard's = PIP joints. RA affects MCP & PIP but SPARES DIP. This is a classic exam distinction!","OA vs RA Joint Involvement"],
"Anti-CCP antibody is specific for?":["Anti-CCP is more specific than RF for RA (specificity ~95%). Can be positive years before clinical RA develops. RF is less specific.","RA Serology"],
"Bamboo spine is seen in?":["Ankylosing spondylitis — syndesmophytes bridge vertebral bodies creating bamboo spine on X-ray. HLA-B27 positive. Young males. Sacroiliitis = earliest finding.","Ankylosing Spondylitis"],
"Most specific antibody for SLE?":["Anti-Smith is most SPECIFIC for SLE. Anti-dsDNA is also specific and correlates with disease activity/nephritis. ANA is most SENSITIVE but least specific.","SLE Antibodies"],
"Negatively birefringent crystals are seen in?":["Monosodium urate crystals in gout = needle-shaped, negatively birefringent (yellow under parallel light). Pseudogout (CPPD) = rhomboid, positively birefringent.","Crystal Arthropathies"],
"HLA-B27 is associated with?":["Seronegative spondyloarthropathies: AS, reactive arthritis, psoriatic arthritis, IBD arthritis. NOT associated with RA or SLE (HLA-DR4 for RA).","HLA Associations"],
"Schober's test is used to assess?":["Measures lumbar spine flexion — mark 10cm above & 5cm below PSIS. <5cm increase on flexion = restricted. Key test for ankylosing spondylitis.","Spinal Examination"],
"Drug of choice for acute gout?":["NSAIDs (indomethacin) are first-line for acute gout. Colchicine is second-line. Allopurinol is for prophylaxis only — starting it in acute attack worsens flare!","Acute Gout Management"],
"Jaccoud's arthropathy is seen in?":["Reducible, non-erosive joint deformity in SLE (unlike RA which is erosive & irreducible). Post-rheumatic fever also causes Jaccoud's arthropathy.","SLE Musculoskeletal"],
// Hematology
"Target cells are seen in all EXCEPT?":["Target cells = thalassemia, iron deficiency, liver disease, HbC disease. NOT G6PD deficiency (causes bite cells & Heinz bodies instead).","Peripheral Smear Findings"],
"Reed-Sternberg cells are pathognomonic of?":["Owl-eye giant cells = RS cells in Hodgkin's lymphoma. CD15+ CD30+ (not CD45). Essential for diagnosis. NHL lacks RS cells.","Hodgkin's Lymphoma"],
"Auer rods are seen in?":["Auer rods (fused azurophilic granules) are pathognomonic of AML, especially M3 (APL). NOT seen in ALL or chronic leukemias. APL = t(15;17).","AML Classification"],
"Philadelphia chromosome is seen in?":["t(9;22) BCR-ABL fusion → CML (>95%). Also in some ALL (25% adults). Treatment: imatinib (TKI). Not seen in AML or CLL.","CML & Philadelphia Chromosome"],
"Most common inherited bleeding disorder?":["Von Willebrand disease (vWD) is the most common inherited bleeding disorder. Hemophilia A (Factor VIII) is the most common hemophilia.","Bleeding Disorders"],
"Howell-Jolly bodies are seen after?":["Nuclear remnants in RBCs normally removed by spleen. Seen after splenectomy, in hyposplenism, and sickle cell disease (functional asplenia).","Splenic Function"],
"Bence Jones proteins are found in?":["Free immunoglobulin light chains in urine of multiple myeloma patients. Myeloma = M-spike, lytic bone lesions, hypercalcemia, renal failure, anemia.","Multiple Myeloma"],
"Ringed sideroblasts are seen in?":["Iron-laden mitochondria around the nucleus in sideroblastic anemia. Causes: lead poisoning, isoniazid, alcohol. Treated with pyridoxine (B6).","Sideroblastic Anemia"],
"Tear drop cells (dacrocytes) are seen in?":["Myelofibrosis is the classic association. Also in myelophthisic anemias (marrow replacement). Dry tap on bone marrow aspiration.","Myelofibrosis"],
"Most common leukemia in children?":["ALL (acute lymphoblastic leukemia) = most common childhood cancer overall. Peak age 2-5 years. CLL = most common leukemia in adults/elderly.","Childhood Leukemia"],
// Infectious Diseases
"Widal test is used for?":["Detects antibodies against Salmonella typhi O & H antigens. Rising titer >1:160 is significant. Best done in 2nd week. Blood culture is gold standard.","Typhoid Fever Diagnosis"],
"Paul-Bunnell test is positive in?":["Heterophile antibody test for infectious mononucleosis (EBV). Monospot test is more commonly used now. Atypical lymphocytes on smear.","Infectious Mononucleosis"],
"Most common cause of meningitis in neonates?":["E. coli (K1 strain) and GBS are top causes in neonates. N. meningitidis & S. pneumoniae affect older children/adults. H. influenzae declined post-vaccine.","Neonatal Meningitis"],
"Koplik spots are pathognomonic of?":["White spots on buccal mucosa opposite molars appearing 2-3 days BEFORE rash. Pathognomonic of measles. Forchheimer spots = rubella (soft palate).","Measles"],
"Rose spots are seen in?":["Salmon-colored blanching macules on abdomen/chest in typhoid fever (2nd-3rd week). They represent bacterial emboli in the skin.","Typhoid Fever"],
"Negri bodies are seen in?":["Eosinophilic intracytoplasmic inclusion bodies in hippocampal neurons in rabies. Pathognomonic. Guarnieri bodies = smallpox. Cowdry B = polio.","Rabies"],
"Drug of choice for MRSA?":["Vancomycin is DOC for serious MRSA infections. Linezolid for vancomycin-resistant. Cloxacillin treats MSSA only. MRSA = resistant to all beta-lactams.","MRSA Treatment"],
"Most common opportunistic infection in AIDS?":["Pneumocystis jirovecii pneumonia (PCP) at CD4 <200. Candidiasis is the most common overall OI. CMV retinitis at CD4 <50. Toxoplasma at CD4 <100.","HIV/AIDS Opportunistic Infections"],
"Erythema chronicum migrans is seen in?":["Expanding bulls-eye rash at tick bite site = Lyme disease (Borrelia burgdorferi). Early sign. Treatment: doxycycline (adults), amoxicillin (children/pregnant).","Lyme Disease"],
"Jarisch-Herxheimer reaction is seen in treatment of?":["Acute febrile reaction after treating spirochetal infections (syphilis, leptospirosis, Lyme). Due to endotoxin release from killed organisms.","Syphilis Treatment"],
// OBG - Normal Pregnancy
"Duration of normal human pregnancy from LMP?":["40 weeks (280 days) from LMP. Naegele's rule: LMP + 7 days − 3 months. Term = 37-42 weeks. Preterm <37 weeks. Post-term >42 weeks.","Gestational Age Calculation"],
"Hegar's sign is a sign of?":["Softening of lower uterine segment at 6-8 weeks — early sign of pregnancy. Goodell's sign = softening of cervix. Chadwick's = bluish vagina.","Early Pregnancy Signs"],
"Quickening in primigravida is felt at?":["18-20 weeks in primigravida, 16-18 weeks in multigravida. It's the mother's first perception of fetal movement. Earlier in multi due to experience.","Fetal Milestones"],
"Chadwick's sign refers to?":["Bluish/purplish discoloration of vagina & cervix due to increased vascularity. Seen at 6-8 weeks. Goodell's = cervical softening. Hegar's = uterine softening.","Early Pregnancy Signs"],
"Fundal height at umbilicus corresponds to gestational age of?":["24 weeks (not 20!). At 20 weeks, fundus is just below umbilicus. At 36 weeks = xiphoid. This is a commonly tested landmark.","Fundal Height Assessment"],
"Physiological anemia of pregnancy is due to?":["Plasma volume increases more (50%) than RBC mass (30%) → hemodilution → decreased Hb. Max dilution at 32-34 weeks. Not true iron deficiency.","Physiological Changes in Pregnancy"],
"Supine hypotension syndrome in pregnancy is due to compression of?":["Gravid uterus compresses IVC in supine position → decreased venous return → hypotension. Treatment: left lateral position. Occurs in 3rd trimester.","Pregnancy Hemodynamics"],
"Linea nigra is caused by increased?":["MSH (melanocyte-stimulating hormone) increases in pregnancy causing linea nigra, chloasma (melasma), and darkening of areola. Estrogen also contributes.","Skin Changes in Pregnancy"],
"Braxton Hicks contractions are?":["Painless, irregular, non-progressive contractions. NOT associated with cervical dilation. True labor = regular, progressive, with cervical changes. Don't confuse!","True vs False Labor"],
"Lightening in primigravida occurs at?":["36 weeks — fetal head descends into pelvis. Multigravida = at onset of labor. Primigravida feels relief of dyspnea but increased urinary frequency.","Signs of Approaching Labor"],
// OBG - General
"Most common cause of postpartum hemorrhage?":["Uterine atony (75-80%) — failure of uterus to contract after delivery. The 4 T's: Tone (atony), Tissue (retained), Trauma (tears), Thrombin (coagulopathy).","Postpartum Hemorrhage"],
"Bishop's score is used to assess?":["Cervical favorability for labor induction. Score ≥8 = favorable. Assesses: dilation, effacement, station, consistency, position. Low score → ripen cervix first.","Labor Induction"],
"Bandl's ring is seen in?":["Pathological retraction ring between upper & lower uterine segments in obstructed labor. Impending rupture sign. IMMEDIATE C-section required.","Obstructed Labor"],
"Most common ectopic pregnancy site?":["Ampulla of fallopian tube (70-80%). Isthmus is 2nd most common. Risk factors: PID, previous ectopic, tubal surgery, IUD.","Ectopic Pregnancy"],
"Sheehan's syndrome is due to?":["Postpartum pituitary necrosis from severe hemorrhage/shock. Pituitary enlarges in pregnancy (hyperplasia) making it vulnerable. Failure to lactate is the earliest sign.","Sheehan's Syndrome"],
"PCOD is associated with all EXCEPT?":["PCOD has INCREASED LH:FSH ratio (>2:1), not decreased. Features: obesity, hirsutism, insulin resistance, anovulation, multiple peripheral ovarian cysts.","PCOD/PCOS"],
"Drug of choice for eclampsia?":["MgSO4 (Pritchard/Zuspan regimen) is the DOC for seizure prevention & treatment. Therapeutic range: 4-7 mEq/L. Antidote = calcium gluconate.","Eclampsia Management"],
"Most common ovarian tumor in pregnancy?":["Dermoid cyst (mature cystic teratoma) — most common benign ovarian tumor in reproductive age. Contains teeth, hair, sebum. Bilateral in 10%.","Ovarian Tumors in Pregnancy"],
"Partogram helps monitor?":["WHO tool to monitor progress of labor — documents cervical dilation, descent, FHR, contractions, vitals. Alert & action lines guide intervention.","Partogram & Labor Monitoring"],
"Montevideo units measure?":["Intensity of uterine contractions × number of contractions in 10 minutes. >200 MVU = adequate labor. Used to assess adequacy of contractions.","Uterine Contraction Assessment"],
"Most common presentation at term?":["Vertex (cephalic) — 96% of all term presentations. Breech = 3-4%. Transverse = <1%. Face/brow = very rare.","Fetal Presentation"],
"Krukenberg tumor originates from?":["Metastatic tumor TO the ovary FROM the stomach (signet ring cells). Spread via transperitoneal route. The question asks origin = stomach, not ovary.","Ovarian Metastases"],
// Surgery
"Most common type of hernia?":["Indirect inguinal hernia (through deep ring, lateral to inferior epigastric vessels). Direct = through Hesselbach's triangle, medial to vessels. Femoral = below inguinal ligament.","Hernias"],
"McBurney's point tenderness suggests?":["Junction of lateral 1/3 & medial 2/3 of line from ASIS to umbilicus. Appendicitis — most common surgical emergency. Rovsing's & Psoas sign also positive.","Appendicitis"],
"Charcot's joint is seen in?":["Neuropathic joint destruction due to loss of protective sensation in diabetes mellitus (most common cause today). Also: tabes dorsalis, syringomyelia, leprosy.","Neuropathic Joints"],
"Sister Mary Joseph nodule is found at?":["Umbilical metastatic nodule, usually from GI or ovarian malignancy (transcoelomic spread). Named after a Mayo Clinic surgical assistant.","Metastatic Nodules"],
"Most common site of gastric ulcer?":["Lesser curvature (especially at incisura angularis). Greater curvature ulcers are rare but more likely to be malignant. Duodenal ulcer = 1st part, anterior wall.","Peptic Ulcer Disease"],
"Virchow's node is located at?":["Left supraclavicular lymph node — metastasis from abdominal malignancy (especially gastric CA) via thoracic duct. Troisier's sign = palpable Virchow's node.","Lymph Node Metastasis"],
"Most common cause of surgical jaundice?":["Gallstones (choledocholithiasis) — most common cause of obstructive jaundice requiring surgery. Pancreatic head CA is 2nd most common.","Surgical Jaundice"],
"Battle's sign indicates?":["Mastoid ecchymosis = middle cranial fossa fracture (temporal bone). Raccoon eyes = anterior cranial fossa fracture. CSF otorrhea may accompany.","Base of Skull Fractures"],
"Coulvoisier's law — palpable GB with jaundice suggests?":["Palpable non-tender GB + jaundice = NOT gallstones (chronic stones → fibrosed GB). Points to malignant obstruction — periampullary/pancreatic head CA.","Courvoisier's Law"],
"Most common thyroid malignancy?":["Papillary CA (80%) — best prognosis. Orphan Annie eye nuclei + psammoma bodies. Lymphatic spread. Follicular = hematogenous spread. Anaplastic = worst prognosis.","Thyroid Malignancies"],
"Rovsing's sign is positive in?":["Pain in RIF on pressing LIF = Rovsing's sign in appendicitis. Indicates peritoneal irritation. Other signs: Psoas, Obturator, Dunphy's (pain on coughing).","Appendicitis Signs"],
"Zadek's operation is done for?":["Complete nail bed excision + germinal matrix ablation for recurrent ingrown toenail (onychocryptosis). Wedge resection = partial procedure for mild cases.","Ingrown Toenail Surgery"],
// Paeds
"Most common congenital heart disease?":["VSD is the most common CHD overall. ASD is the most common acyanotic CHD presenting in adults. TOF is the most common cyanotic CHD after 1 year.","Congenital Heart Disease"],
"Koplik's spots are seen in?":["White spots on buccal mucosa in measles — pathognomonic. Appear 2-3 days before rash. Forchheimer spots (rubella) are on soft palate.","Measles — Koplik's Spots"],
"Most common childhood malignancy?":["ALL is the most common childhood cancer. Wilms tumor = most common renal tumor. Neuroblastoma = most common extracranial solid tumor. Retinoblastoma = eye.","Childhood Cancers"],
"Moro reflex disappears by?":["4 months (some say 3-6). Persistence beyond 6 months = UMN pathology. Asymmetric Moro = Erb's palsy or fracture clavicle.","Primitive Reflexes"],
"Social smile appears at?":["2 months is the milestone. Stranger anxiety = 8-9 months. Pincer grasp = 9 months. Walking = 12 months. Key developmental milestones!","Developmental Milestones"],
"Kernicterus is caused by deposition of?":["Unconjugated (indirect) bilirubin crosses BBB and deposits in basal ganglia, hippocampus. Direct bilirubin is water-soluble and does NOT cross BBB.","Neonatal Jaundice"],
"ORS composition—sodium concentration (mmol/L)?":["Low-osmolarity ORS has Na 75 mmol/L (WHO 2002 formula). Old formula had Na 90. Reduced osmolarity ORS decreases stool output by 25%.","ORS Composition"],
"Retinoblastoma gene is located on chromosome?":["Chromosome 13q14 (RB1 gene). Two-hit hypothesis (Knudson). Leukocoria (white pupillary reflex) = most common presentation.","Retinoblastoma"],
"Pincer grasp develops at?":["9 months — thumb-finger opposition for small objects. Palmar grasp = 6 months. Tripod grasp = 12 months. Essential fine motor milestone.","Fine Motor Milestones"],
"Vitamin K prophylaxis at birth prevents?":["Hemorrhagic disease of the newborn (vitamin K deficiency bleeding). Neonates lack gut flora to synthesize vitamin K. 1mg IM at birth.","Neonatal Vitamin K"],
"Handedness is established by what age?":["3 years. Established handedness before 18 months suggests contralateral hemiparesis. This is a subtle but important red flag.","Motor Development"],
"Most common organism causing neonatal sepsis?":["Early-onset (<72h) = GBS (Group B Streptococcus). Late-onset = Staph aureus, CoNS. E. coli is 2nd most common overall in neonatal sepsis.","Neonatal Sepsis"],
// ENT
"Most common cause of epistaxis in children?":["Nose picking (digital trauma) at Little's area (Kiesselbach's plexus) on anterior nasal septum. Posterior epistaxis = elderly + hypertension (sphenopalatine artery).","Epistaxis"],
"Quinsy is?":["Peritonsillar abscess — complication of acute tonsillitis. Presents with trismus, muffled voice, uvula deviation. Treatment: I&D + antibiotics.","Peritonsillar Abscess"],
"Rinne test is negative in?":["BC > AC = negative Rinne = conductive hearing loss. Normal/SNHL: AC > BC (positive Rinne). False negative Rinne = severe SNHL in one ear.","Tuning Fork Tests"],
"Bezold's abscess is a complication of?":["CSOM (cholesteatoma) — pus tracks through mastoid tip into SCM/digastric muscles of neck. Mastoiditis complication, NOT acute otitis media.","CSOM Complications"],
"Trotter's triad is seen in?":["Nasopharyngeal CA: conductive deafness + ipsilateral trigeminal neuralgia + palatal palsy. Due to invasion of parapharyngeal space.","Nasopharyngeal Carcinoma"],
"Most common benign tumor of larynx?":["Squamous papilloma (caused by HPV 6 & 11). Can be juvenile (multiple, recurrent) or adult (usually solitary). Hemangioma = most common in infants.","Laryngeal Tumors"],
"Caldwell-Luc operation is done for?":["Radical maxillary antrostomy via canine fossa approach for chronic maxillary sinusitis. Now largely replaced by FESS (functional endoscopic sinus surgery).","Maxillary Sinusitis Surgery"],
"Gradenigo syndrome involves cranial nerve?":["CN V (trigeminal neuralgia) + CN VI (lateral rectus palsy/diplopia) + otorrhea. Complication of petrous apicitis from otitis media.","Gradenigo Syndrome"],
"Most common foreign body site in airway?":["Right main bronchus — wider, shorter, more vertical than left. Hence foreign bodies preferentially enter right side. Most common FB in children = peanut.","Airway Foreign Bodies"],
"Le Fort I fracture line passes through?":["Horizontal fracture above the teeth (maxilla only). Le Fort II = pyramidal (across nasal bridge). Le Fort III = craniofacial dysjunction (across skull base).","Le Fort Fracture Classification"],
"A 28-year-old woman with progressive hearing loss hears better in noisy environments. What is this phenomenon?":["Paracusis Willisii = hearing better in noise, pathognomonic of otosclerosis. In noise, people speak louder, overcoming the conductive loss.","Otosclerosis"],
"Which audiometric finding is characteristically seen in otosclerosis?":["Carhart's notch = false bone conduction dip at 2000 Hz. It's mechanical, not true SNHL — disappears after successful stapedotomy.","Otosclerosis Audiometry"],
"A pink blush seen through intact tympanic membrane in active otosclerosis is called?":["Schwartze sign = flamingo pink/red blush due to active otospongiosis with increased vascularity of promontory seen through intact TM.","Active Otosclerosis"],
"Tympanometry in otosclerosis shows?":["Type As (shallow/stiff) = reduced compliance due to stapes fixation. Type B = flat (effusion). Type C = negative pressure (Eustachian tube dysfunction). Type Ad = hypermobile.","Impedance Audiometry"],
"Most feared complication of stapedotomy?":["SNHL is irreversible and most feared — converts a manageable conductive loss to permanent total hearing loss. Perilymph fistula & vertigo are also serious but often treatable.","Stapedotomy Complications"],
// Ophthalmology
"Most common cause of preventable blindness worldwide?":["Trachoma (Chlamydia trachomatis A-C) = preventable. Cataract = most common cause of reversible blindness. Glaucoma = most common cause of irreversible blindness.","Preventable Blindness"],
"Marcus Gunn pupil indicates?":["Relative afferent pupillary defect (RAPD) — swinging flashlight test shows paradoxical dilation when light swings to affected eye. Indicates optic nerve/severe retinal disease.","RAPD"],
"Cherry red spot on macula is seen in?":["CRAO (central retinal artery occlusion) — macula appears red because choroidal circulation shows through thin fovea while pale ischemic retina surrounds it. Also: Tay-Sachs, Niemann-Pick.","CRAO"],
"Bitot's spots are due to deficiency of?":["Vitamin A deficiency causes Bitot's spots (triangular, foamy, keratinized conjunctival patches), xerophthalmia, night blindness, keratomalacia.","Vitamin A Deficiency"],
"Most common intraocular malignancy in adults?":["Uveal melanoma (choroidal melanoma) in adults. Retinoblastoma is the most common in children. Metastasis to eye is actually the most common overall IO tumor.","Intraocular Tumors"],
"Fleischer ring is seen in?":["Iron deposition (hemosiderin) at base of cone in keratoconus — brownish ring. Kayser-Fleischer ring = Wilson's disease (copper in Descemet's membrane).","Corneal Rings"],
"Seidel test is used to detect?":["Aqueous humor leak from a corneal/scleral wound. Fluorescein applied → green stream = positive Seidel test. Important post-trauma/post-surgery.","Ocular Trauma Assessment"],
"Accommodation triad includes all EXCEPT?":["Miosis + convergence + increased lens curvature (for near vision). Mydriasis (pupil dilation) is the OPPOSITE — occurs for distance vision.","Accommodation Reflex"],
"Most common type of squint in children?":["Esotropia (convergent squint) is more common than exotropia in children. Non-paralytic/concomitant type is most common in pediatric age group.","Pediatric Squint"],
"Glaucoma is diagnosed by measuring?":["IOP measurement (tonometry) is key for glaucoma diagnosis. But IOP alone isn't sufficient — need optic disc assessment, visual fields (perimetry), and gonioscopy.","Glaucoma Diagnosis"],
// Dermatology
"Nikolsky's sign is positive in?":["Lateral pressure on normal-appearing skin causes epidermal separation in pemphigus vulgaris (intraepidermal). NEGATIVE in bullous pemphigoid (subepidermal).","Pemphigus vs Pemphigoid"],
"Auspitz sign is seen in?":["Removal of psoriatic scales reveals pinpoint bleeding (due to dilated capillaries in elongated dermal papillae). Pathognomonic of psoriasis.","Psoriasis"],
"Herald patch is characteristic of?":["Initial large oval patch followed by smaller lesions in 'Christmas tree' pattern = pityriasis rosea. Self-limiting. Associated with HHV-6/HHV-7.","Pityriasis Rosea"],
"Wickham's striae are seen in?":["Fine white lines on surface of lichen planus papules. 5 P's: Purple, Polygonal, Planar, Pruritic Papules. Oral mucosa = lacy white pattern.","Lichen Planus"],
"Most common skin malignancy?":["BCC (basal cell carcinoma) — locally invasive, rarely metastasizes. Rodent ulcer. SCC = 2nd most common, can metastasize. Melanoma = most lethal.","Skin Malignancies"],
"Koebner phenomenon is seen in all EXCEPT?":["Koebner (isomorphic response) = new lesions at trauma site. Seen in psoriasis, lichen planus, vitiligo. NOT in pemphigoid. Also seen in warts & molluscum.","Koebner Phenomenon"],
"Dermatitis herpetiformis is associated with?":["DH is the skin manifestation of celiac disease (gluten sensitivity). IgA deposits at dermal papillae. Intensely pruritic grouped vesicles on extensor surfaces.","Dermatitis Herpetiformis"],
"Target (iris) lesions are seen in?":["Erythema multiforme — hypersensitivity reaction (HSV, drugs). Central dusky zone + pale ring + erythematous outer ring. Stevens-Johnson = severe form.","Erythema Multiforme"],
"Tzanck smear shows acantholytic cells in?":["Rounded, detached keratinocytes due to loss of desmosomes (acantholysis) in pemphigus. Tzanck smear also shows multinucleated giant cells in herpes.","Pemphigus — Tzanck Smear"],
"'Leonine facies' is characteristic of?":["Diffuse infiltration of facial skin with loss of eyebrows in lepromatous leprosy (LL). Tuberculoid = well-defined, hypopigmented, anesthetic patches.","Leprosy Classification"],
// Ortho
"Most common carpal bone fracture?":["Scaphoid — most commonly fractured carpal bone (fall on outstretched hand). Anatomical snuffbox tenderness. AVN risk due to retrograde blood supply.","Scaphoid Fractures"],
"Colles' fracture has?":["Dorsal displacement + dorsal angulation of distal radius fragment = dinner fork deformity. Smith's fracture = reverse (volar displacement) = garden spade deformity.","Distal Radius Fractures"],
"Pott's fracture involves?":["Ankle fracture-dislocation (bimalleolar/trimalleolar). NOT tibial shaft. Colles = wrist. Named after Percival Pott.","Ankle Fractures"],
"Most common bone tumor?":["Metastases are the most common bone tumors overall. Osteosarcoma = most common PRIMARY malignant bone tumor. Osteochondroma = most common benign.","Bone Tumors"],
"Garden classification is for fractures of?":["Femoral neck fractures (intracapsular). Garden I-II = undisplaced (fix). Garden III-IV = displaced (replace — hemiarthroplasty/THR). Higher grade = higher AVN risk.","Femoral Neck Fractures"],
"Erb's palsy involves nerve roots?":["C5-C6 (upper trunk). Waiter's tip position. Klumpke's palsy = C8-T1 (lower trunk) = claw hand ± Horner syndrome.","Brachial Plexus Injuries"],
"Trendelenburg test is positive when which muscle is weak?":["Gluteus medius (hip abductor). Standing on affected leg → opposite pelvis drops. Causes: polio, hip pathology, superior gluteal nerve injury.","Hip Examination"],
"Boutonniere deformity is?":["PIP flexion + DIP hyperextension due to central slip rupture of extensor tendon. Swan neck = opposite (PIP hyperextension + DIP flexion). Both seen in RA.","Hand Deformities"],
"Most common site of osteosarcoma?":["Lower end of femur (around knee — 60%). Upper tibia is 2nd. Metaphysis of long bones in young adults. Codman's triangle & sunburst pattern on X-ray.","Osteosarcoma"],
"Thomas test detects?":["Fixed flexion deformity of hip. One hip is maximally flexed to eliminate lumbar lordosis. If opposite leg lifts off the bed → positive Thomas test = FFD.","Hip Examination"],
"Bankart lesion is seen in?":["Anterior-inferior glenoid labral tear in anterior shoulder dislocation (most common direction). Hill-Sachs = posterolateral humeral head compression fracture.","Shoulder Dislocation"],
"Dinner fork deformity is seen in?":["Colles' fracture — dorsal displacement of distal radius. Caused by FOOSH (fall on outstretched hand). Occurs in elderly osteoporotic women.","Colles' Fracture"]
        };
        // Apply explanations to all questions
        (function(){
            function applyExp(questions) {
                questions.forEach(q => {
                    const exp = EXP[q.q];
                    if(exp) { q.e = exp[0]; q.r = exp[1]; }
                });
            }
            Object.values(MED_SUBCATEGORIES).forEach(s => applyExp(s.questions));
            Object.values(OBG_SUBCATEGORIES).forEach(s => applyExp(s.questions));
            Object.values(QUESTIONS).forEach(qs => applyExp(qs));
        })();

        // ========== PROFILE ==========
        function getProfileName() {
            const p = JSON.parse(localStorage.getItem('nbd_profile') || '{}');
            return p.name || 'Player';
        }

        function saveProfile() {
            const name = document.getElementById('profileName').value.trim();
            const email = document.getElementById('profileEmail').value.trim();
            const err = document.getElementById('nameError');
            if (!name) { err.style.display = 'block'; document.getElementById('profileName').style.borderColor = 'var(--red)'; return; }
            err.style.display = 'none';
            localStorage.setItem('nbd_profile', JSON.stringify({ name, email }));
            trackEvent('new_user', { name, email });
            showScreen('homeScreen');
            updateGreeting();
            init();
        }

        function updateGreeting() {
            const p = JSON.parse(localStorage.getItem('nbd_profile') || '{}');
            const bar = document.getElementById('greetingBar');
            if (p.name) {
                bar.innerHTML = `Hey, <strong>${p.name}</strong>! <button class="edit-profile-btn" onclick="editProfile()">Edit Profile</button>`;
            }
        }

        function editProfile() {
            const p = JSON.parse(localStorage.getItem('nbd_profile') || '{}');
            document.getElementById('profileName').value = p.name || '';
            document.getElementById('profileEmail').value = p.email || '';
            showScreen('profileScreen');
        }

        // ========== ANALYTICS ==========
        // 👉 REPLACE THIS URL with your deployed Google Apps Script URL
        const TRACKING_URL = 'https://script.google.com/macros/s/AKfycbwxFErgPmvEul7E4v-Ba4jb5uSyBONjeSwy1c-WoMyjjE5ZMkvoDZuR995dokrmUgxv/exec';

        const _sessionStart = Date.now();

        function trackEvent(eventType, data = {}) {
            if (!TRACKING_URL) return; // skip if not configured
            const profile = JSON.parse(localStorage.getItem('nbd_profile') || '{}');
            const payload = {
                event: eventType,
                name: profile.name || 'Unknown',
                email: profile.email || '',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                screenWidth: screen.width,
                ...data
            };
            try {
                navigator.sendBeacon(TRACKING_URL, JSON.stringify(payload));
            } catch (e) {
                fetch(TRACKING_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' }).catch(() => {});
            }
        }

        // Track time spent when user leaves
        window.addEventListener('beforeunload', () => {
            const seconds = Math.round((Date.now() - _sessionStart) / 1000);
            trackEvent('time_spent', { seconds, minutes: Math.round(seconds / 60 * 10) / 10 });
        });

        // Boot
        (function boot() {
            const profile = JSON.parse(localStorage.getItem('nbd_profile') || '{}');
            if (!profile.name) {
                document.getElementById('profileScreen').classList.add('active');
            } else {
                document.getElementById('homeScreen').classList.add('active');
                updateGreeting();
                trackEvent('visit'); // track returning visitor
            }
            init();
        })();
    </script>
</body>
